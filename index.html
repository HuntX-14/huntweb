  <main id="inicio">
    <section class="hero container" aria-labelledby="heroTitle">
      <div class="hero__content">
        <p class="eyebrow">Lista De Mods</p>
        <h1 id="heroTitle">Dragon Ball Z <span>Budokai Tenkaichi 3 Mods</span></h1>
      </div>

      <div class="search" role="search">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m20 20-4.2-4.2m1.2-5.3a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z"/></svg>
        <input id="searchInput" type="search" placeholder="Buscar" autocomplete="off" spellcheck="false" aria-label="Buscar mods">
        <button id="clearSearch" type="button" aria-label="Limpiar búsqueda" title="Limpiar" hidden>×</button>
      </div>
    </section>

    <section class="catalog container" aria-label="Lista de mods">
      <div class="mods-grid" id="modsGrid" aria-live="polite"></div>

      <div class="empty-state" id="emptyState" hidden>
        <span aria-hidden="true">⌕</span>
        <h3>No se encontraron mods</h3>
        <p>Prueba con otro nombre.</p>
        <button id="resetSearch" type="button">Mostrar todos</button>
      </div>
    </section>
  </main>

  <footer class="site-footer" id="contacto">
    <div class="site-footer__inner container">
      <div>
        <strong>Hunter</strong>
        <p>Lista de mods para el Dragon Ball Z Budokai Tenkaichi 3</p>
      </div>
      <p><a href="https://www.youtube.com/@sparkingdanze" target="_blank" rel="noopener noreferrer">Sparking DanZe</a></p>
    </div>
  </footer>

  <button class="back-to-top" id="backToTop" type="button" aria-label="Volver al inicio" aria-hidden="true" title="Volver arriba">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="m6 14 6-6 6 6"></path>
    </svg>
  </button>

  <template id="cardTemplate">
    <article class="mod-card reveal">
      <div class="mod-card__media">
        <img class="mod-card__image" src="" alt="" loading="lazy" decoding="async">
        <div class="mod-card__overlay"></div>
      </div>

      <div class="mod-card__body">
        <div class="mod-card__heading">
          <h3 class="mod-card__title"></h3>
        </div>

        <div class="mod-card__actions">
          <a class="button button--primary mod-card__download" href="#">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4v11m0 0 4-4m-4 4-4-4M5 20h14"/></svg>
            <span>Descargar</span>
          </a>
          <a class="button button--secondary mod-card__video" href="#">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 7 7 5-7 5V7Z"/></svg>
            <span>Video</span>
          </a>
        </div>
      </div>
    </article>
  </template>

  <script src="data/mods.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
